<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screensaver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c0392b;
    --red-glow: rgba(192,57,43,0.6);
    --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* ── VIDEO BACKGROUND ── */
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: brightness(0.55) saturate(1.3) contrast(1.1);
  }

  /* ── VIDEO QUALITY OVERLAYS ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.5) 70%,
      rgba(0,0,0,0.85) 100%
    );
    pointer-events: none;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
  }

  .red-tint {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at 50% 100%,
      rgba(192,57,43,0.18) 0%,
      transparent 65%
    );
    pointer-events: none;
  }

  /* ── CLOCK WRAPPER ── */
  .flip-clock-wrap {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .flip-clock {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .flip-unit {
    display: flex;
    gap: 10px;
  }

  /* ── CARD ── */
  .flip-card {
    width: 160px;
    height: 200px;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    backdrop-filter: blur(32px) saturate(180%) brightness(1.1);
    -webkit-backdrop-filter: blur(32px) saturate(180%) brightness(1.1);
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow:
      0 8px 40px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.12),
      0 0 0 0.5px rgba(192,57,43,0.15);
  }

  /* glass sheen */
  .flip-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.03) 40%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 30;
  }

  .fc-static-top, .fc-static-bot {
    position: absolute;
    left: 0; width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10rem;
    color: #ffffff;
    text-shadow:
      0 0 20px rgba(255,255,255,0.3),
      0 0 60px rgba(192,57,43,0.4);
    overflow: hidden;
  }

  .fc-static-top {
    height: calc(50% - 3px);
    top: 0;
    border-radius: 14px 14px 0 0;
    background: rgba(255,255,255,0.03);
    border-bottom: 1.5px solid rgba(0,0,0,0.5);
    align-items: flex-start;
  }

  .fc-static-top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .fc-static-bot {
    height: calc(50% - 3px);
    bottom: 0;
    border-radius: 0 0 14px 14px;
    background: rgba(0,0,0,0.12);
    border-top: 1.5px solid rgba(0,0,0,0.4);
    align-items: flex-end;
  }

  .fc-flap {
    position: absolute;
    left: 0; width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10rem;
    color: #ffffff;
    text-shadow:
      0 0 20px rgba(255,255,255,0.3),
      0 0 60px rgba(192,57,43,0.4);
    backface-visibility: hidden;
    z-index: 10;
  }

  .fc-flap.top {
    height: calc(50% - 3px);
    top: 0;
    transform-origin: bottom center;
    background: rgba(255,255,255,0.03);
    border-radius: 14px 14px 0 0;
    align-items: flex-start;
  }

  .fc-flap.top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .fc-flap.bot {
    height: calc(50% - 3px);
    bottom: 0;
    transform-origin: top center;
    background: rgba(0,0,0,0.12);
    border-radius: 0 0 14px 14px;
    align-items: flex-end;
    transform: rotateX(90deg);
  }

  .fc-fold-line {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 5px;
    background: rgba(0,0,0,0.9);
    z-index: 20;
    transform: translateY(-50%);
  }

  /* ── COLON ── */
  .fc-colon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9rem;
    color: rgba(255,255,255,0.4);
    text-shadow: 0 0 20px rgba(192,57,43,0.5);
    animation: fcBlink 1s step-end infinite;
    line-height: 1;
    margin-bottom: 8px;
  }

  @keyframes fcBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  /* ── AM/PM ── */
  .fc-ampm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.35);
    align-self: flex-end;
    margin-bottom: 18px;
    text-shadow: 0 0 10px rgba(192,57,43,0.4);
  }

  /* ── DATE UNDER CLOCK ── */
  .fc-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-shadow: 0 0 10px rgba(192,57,43,0.3);
  }
</style>
</head>
<body>

<!-- DROP YOUR VIDEO FILE NAME HERE -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="https://drive.google.com/uc?export=download&id=1GMjs1e8DlGLB82XOJiczbXfUShWRmoqT" type="video/mp4">
</video>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="red-tint"></div>

<script>
const FLIP_DURATION = 300;

function fcMakeCard(digit) {
  const card = document.createElement('div');
  card.className = 'flip-card';
  const st = document.createElement('div');
  st.className = 'fc-static-top';
  st.textContent = digit;
  const sb = document.createElement('div');
  sb.className = 'fc-static-bot';
  sb.textContent = digit;
  const tf = document.createElement('div');
  tf.className = 'fc-flap top';
  tf.textContent = digit;
  const bf = document.createElement('div');
  bf.className = 'fc-flap bot';
  bf.textContent = digit;
  const fold = document.createElement('div');
  fold.className = 'fc-fold-line';
  card.append(st, sb, tf, bf, fold);
  card._digit = digit;
  card._tf = tf;
  card._bf = bf;
  card._st = st;
  card._sb = sb;
  return card;
}

function fcFlip(card, newDigit) {
  if (card._digit === newDigit || card._flipping) return;
  card._flipping = true;
  const oldDigit = card._digit;
  card._digit = newDigit;
  const { _tf: tf, _bf: bf, _st: st, _sb: sb } = card;
  tf.textContent = oldDigit;
  tf.style.transition = 'none';
  tf.style.transform = 'rotateX(0deg)';
  bf.textContent = newDigit;
  bf.style.transition = 'none';
  bf.style.transform = 'rotateX(90deg)';
  st.textContent = newDigit;
  sb.textContent = oldDigit;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      tf.style.transition = `transform ${FLIP_DURATION}ms cubic-bezier(0.4,0,0.2,1)`;
      tf.style.transform = 'rotateX(-90deg)';
      setTimeout(() => {
        bf.style.transition = `transform ${FLIP_DURATION}ms cubic-bezier(0.4,0,0.2,1)`;
        bf.style.transform = 'rotateX(0deg)';
      }, FLIP_DURATION * 0.45);
      setTimeout(() => {
        sb.textContent = newDigit;
        tf.style.transition = 'none';
        tf.style.transform = 'rotateX(0deg)';
        tf.textContent = newDigit;
        bf.style.transition = 'none';
        bf.style.transform = 'rotateX(90deg)';
        card._flipping = false;
      }, FLIP_DURATION * 1.6);
    });
  });
}

function fcInitUnit(wrap, str) {
  str.split('').forEach(d => wrap.appendChild(fcMakeCard(d)));
}

function fcUpdateUnit(wrap, str) {
  const cards = wrap.children;
  str.split('').forEach((d, i) => fcFlip(cards[i], d));
}

(function initClock() {
  const wrap = document.createElement('div');
  wrap.className = 'flip-clock-wrap';
  wrap.innerHTML = `
    <div class="flip-clock">
      <div class="flip-unit" id="fcHours"></div>
      <div class="fc-colon">:</div>
      <div class="flip-unit" id="fcMinutes"></div>
      <div class="fc-ampm" id="fcAmpm"></div>
    </div>
    <div class="fc-date" id="fcDate"></div>
  `;
  document.body.appendChild(wrap);

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let started = false;
  let prevAp = '';

  function tick() {
    const now = new Date();
    let h = now.getHours();
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    const hStr = String(h).padStart(2, '0');
    const mStr = String(now.getMinutes()).padStart(2, '0');
    const dateStr = `${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

    if (!started) {
      fcInitUnit(document.getElementById('fcHours'), hStr);
      fcInitUnit(document.getElementById('fcMinutes'), mStr);
      document.getElementById('fcAmpm').textContent = ap;
      document.getElementById('fcDate').textContent = dateStr;
      started = true;
    } else {
      fcUpdateUnit(document.getElementById('fcHours'), hStr);
      fcUpdateUnit(document.getElementById('fcMinutes'), mStr);
      if (ap !== prevAp) document.getElementById('fcAmpm').textContent = ap;
      document.getElementById('fcDate').textContent = dateStr;
    }
    prevAp = ap;
  }

  tick();
  const now = new Date();
  const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
  setTimeout(() => { tick(); setInterval(tick, 60000); }, msUntilNextMinute);
})();
</script>
</body>
</html>
